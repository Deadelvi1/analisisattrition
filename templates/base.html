<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSP Attrition Analyze</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-logo">
            <i class="fas fa-chart-network"></i>
            <span>Attrition Analyze</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}"><i class="fas fa-home"></i> Home Analyze</a>
            <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}"><i class="fas fa-chart-pie"></i> Dashboard Looker</a>
            <a href="/predict" class="nav-item {% if request.path == '/predict' %}active{% endif %}"><i class="fas fa-brain"></i> Predict Attrition</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer style="text-align: center; padding: 40px 0; color: #94a3b8; font-size: 0.8rem;">
        <p>&copy; 2026 DSP Project Attrition Analyze. Powered by Random Forest & MLflow.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.dynamic-fill').forEach(function(el) {
                var value = el.getAttribute('data-progress');
                if (value !== null) {
                    var num = parseFloat(value);
                    if (!Number.isNaN(num)) {
                        el.style.width = num + '%';
                    }
                }
            });
        });
    </script>
</body>
</html>
